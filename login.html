<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCS Sit-in Monitoring System - Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
  <nav class="navbar">
    <div class="logo">College of Computer Studies Sit-in Monitoring System</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#community">Community ▼</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
  </nav>
</header>

<main class="login-container">

  <!-- LOGIN FORM BOX -->
  <div class="form-box">

    <!-- LOGO -->
    <div class="login-logo">
      <img src="ccslogo.png" alt="CCS Logo">
    </div>

    <!-- LOGIN FORM -->
  <div class="login-form">
    <h2>Login</h2>

    <form id="loginForm" method="POST" action="login.php" autocomplete="on">
      <label for="idNumber">Email or ID Number</label>
      <input
        type="text"
        id="idNumber"
        name="idNumber"
        placeholder="Enter Email or ID Number"
        required
        autocomplete="username"
      >

      <label for="password">Password</label>
      <div class="password-wrap">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter Password"
          required
          autocomplete="current-password"
        >
        <span class="password-field-icon" aria-hidden="true">
          <i class="fa-solid fa-lock"></i>
        </span>
      </div>

      <div class="options">
        <label class="remember">
          <input type="checkbox" name="remember" id="remember" value="1">
          <span>Remember me</span>
        </label>
        <a href="forgot_password.html" class="forgot">Forgot Password?</a>
      </div>

      <p id="login-feedback" class="login-feedback" role="status" aria-live="polite"></p>

      <button type="submit">Login</button>

      <p>
        Don't have an account?
        <a href="register.html">Register</a>
      </p>
    </form>
  </div>
</div>

</main>

<!-- SCRIPT -->
<script src="script.js"></script>
<script>
  (function () {
    const idInput = document.getElementById("idNumber");
    const rememberInput = document.getElementById("remember");
    const loginForm = document.getElementById("loginForm");
    const feedback = document.getElementById("login-feedback");

    // Password uses a static inline icon; no toggle button behavior.

    const cookieMatch = document.cookie.match(/(?:^|; )remembered_login=([^;]*)/);
    const rememberedCookie = cookieMatch ? decodeURIComponent(cookieMatch[1]) : "";
    const rememberedId = localStorage.getItem("rememberedLoginId") || rememberedCookie;
    if (rememberedId && idInput && rememberInput) {
      idInput.value = rememberedId;
      rememberInput.checked = true;
    }

    loginForm?.addEventListener("submit", function () {
      if (!idInput || !rememberInput) {
        return;
      }

      if (rememberInput.checked) {
        localStorage.setItem("rememberedLoginId", idInput.value.trim());
      } else {
        localStorage.removeItem("rememberedLoginId");
      }
    });

    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");
    const reset = params.get("reset");

    if (!feedback) {
      return;
    }

    if (reset === "success") {
      feedback.textContent = "Password reset successful. Please login with your new password.";
      feedback.className = "login-feedback success";
    } else if (error === "empty") {
      feedback.textContent = "Please enter both your ID/Email and password.";
      feedback.className = "login-feedback error";
    } else if (error === "invalid") {
      feedback.textContent = "Invalid login credentials. Please try again.";
      feedback.className = "login-feedback error";
    } else if (error === "db") {
      feedback.textContent = "System error. Please try again later.";
      feedback.className = "login-feedback error";
    } else {
      feedback.textContent = "";
      feedback.className = "login-feedback";
    }
  })();
</script>
</body>
</html>
