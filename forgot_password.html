<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCS Sit-in Monitoring System - Forgot Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <nav class="navbar">
    <div class="logo">College of Computer Studies Sit-in Monitoring System</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#community">Community ▼</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
  </nav>
</header>

<main class="login-container">
  <section class="reset-wrapper" aria-label="Reset Password">
    <div class="reset-head">
      <h2>Reset Password</h2>
      <p>Enter your registered Email or ID Number and set a new password.</p>
    </div>

    <form class="reset-form" method="POST" action="forgot_password.php" autocomplete="off">
      <label for="reset-id">Email or ID Number</label>
      <input type="text" id="reset-id" name="loginInput" placeholder="Enter Email or ID Number" required>

      <label for="new-password">New Password</label>
      <input type="password" id="new-password" name="newPassword" placeholder="At least 8 characters" required>

      <label for="confirm-new-password">Confirm New Password</label>
      <input type="password" id="confirm-new-password" name="confirmNewPassword" placeholder="Re-enter New Password" required>

      <p id="reset-message" class="reset-message" role="status" aria-live="polite"></p>

      <div class="reset-actions">
        <button type="submit" class="btn-inline primary">Update Password</button>
        <a href="login.html" class="btn-inline secondary">Back to Login</a>
      </div>
    </form>
  </section>
</main>

<script>
  (function () {
    const message = document.getElementById("reset-message");
    if (!message) {
      return;
    }

    const params = new URLSearchParams(window.location.search);
    const status = params.get("status");
    const code = params.get("code");

    const feedbackMap = {
      required: "Please complete all fields.",
      mismatch: "New password and confirm password do not match.",
      password_length: "New password must be at least 8 characters.",
      not_found: "No account was found for that Email/ID Number.",
      db: "System error while resetting password. Please try again.",
    };

    if (status === "error" && code && feedbackMap[code]) {
      message.textContent = feedbackMap[code];
      message.className = "reset-message error";
      return;
    }

    if (status === "success") {
      message.textContent = "Password updated successfully. You can now login.";
      message.className = "reset-message success";
    }
  })();
</script>
</body>
</html>
